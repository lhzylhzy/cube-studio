name: Build Cube Backend Image

# 触发条件：当有代码 push 到主分支时，自动触发打包
on:
  push:
    branches:
      - master
      - main
  # 允许你在 GitHub 网页上点个按钮手动触发
  workflow_dispatch:

jobs:
  build-and-push:
    # GitHub 免费提供给你的 Ubuntu 运行环境 (自带 Docker)
    runs-on: ubuntu-latest

    steps:
      # 1. 把你的代码拉取到这台云端服务器上
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: true

      # 2. 开启 Docker 的高级编译功能 (支持多架构和缓存)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. 自动登录到 GitHub 自带的容器镜像仓库 (完全免密，利用内置 Token)
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4. 执行核心的 docker build 并推送到仓库
      - name: Build and push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          # 指定你要编译哪个 Dockerfile (这里以后端为例)
          file: install/docker/Dockerfile
          # 打包完直接推送到云端仓库
          push: true
          # 给你打包出来的镜像贴个标签 (镜像地址)
          # ${{ github.repository }} 会自动解析成 你的用户名/项目名
          tags: ghcr.io/${{ github.repository }}/cube-backend:latest